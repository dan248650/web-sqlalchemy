{% extends "layouts/base.html" %}

{% block content %}
<div class="container mt-4">
    <div class="row">
        <div class="col-12">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <h2 class="mb-0">{{ user_name }}: {{ city_name }}</h2>
                </div>
                <div class="card-body text-center">
                    <div>
                        {% if static_map_url %}
                            <img src="{{ static_map_url }}"
                                 alt="Карта города {{ city_name }}"
                                 class="img-fluid rounded shadow"
                                 style="max-width: 100%; height: auto;">
                        {% else %}
                            <div class="alert alert-warning">
                                Не удалось загрузить карту
                            </div>
                        {% endif %}
                    </div>

                    <div class="mt-4">
                        <div class="alert alert-info">
                            <i class="fas fa-map-marker-alt"></i>
                            <strong>Координаты:</strong> {{ lon }}, {{ lat }}
                        </div>

                        <div class="row mt-3">
                            <div class="col-md-12">
                                <a href="https://yandex.ru/maps/?text={{ city_name }}&ll={{ lon }},{{ lat }}&z=12"
                                   target="_blank"
                                   class="btn btn-primary btn-block">
                                    <i class="fas fa-external-link-alt"></i> Открыть в Яндекс.Картах
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
